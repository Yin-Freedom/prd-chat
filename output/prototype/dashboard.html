<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - 考勤管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { primary: '#1a365d', accent: '#ed8936' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen p-6">
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-900">欢迎回来，管理员</h2>
    <p class="text-gray-500 mt-1">以下是考勤系统概览</p>
  </div>

  <!-- 统计卡片 -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">今日打卡人数</p>
          <p class="text-2xl font-bold text-gray-900 mt-1">856</p>
        </div>
        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
          <i class="fas fa-fingerprint text-green-500 text-xl"></i>
        </div>
      </div>
      <p class="text-sm text-green-500 mt-2"><i class="fas fa-arrow-up mr-1"></i>95.6% 出勤率</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">待审批请假</p>
          <p class="text-2xl font-bold text-gray-900 mt-1">12</p>
        </div>
        <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
          <i class="fas fa-calendar-minus text-orange-500 text-xl"></i>
        </div>
      </div>
      <p class="text-sm text-orange-500 mt-2"><i class="fas fa-clock mr-1"></i>需要及时处理</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">今日异常</p>
          <p class="text-2xl font-bold text-gray-900 mt-1">8</p>
        </div>
        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
          <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
        </div>
      </div>
      <p class="text-sm text-red-500 mt-2"><i class="fas fa-arrow-down mr-1"></i>较昨日减少3人</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">考勤组数量</p>
          <p class="text-2xl font-bold text-gray-900 mt-1">15</p>
        </div>
        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
          <i class="fas fa-layer-group text-blue-500 text-xl"></i>
        </div>
      </div>
      <p class="text-sm text-blue-500 mt-2"><i class="fas fa-users mr-1"></i>覆盖896名员工</p>
    </div>
  </div>

  <!-- 快捷入口 -->
  <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
    <h3 class="text-lg font-semibold mb-4">快捷入口</h3>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <a href="modules/attendance-group.html" class="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors text-center">
        <i class="fas fa-layer-group text-2xl text-primary mb-2"></i>
        <p class="text-sm font-medium">考勤组</p>
      </a>
      <a href="modules/shift-management.html" class="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors text-center">
        <i class="fas fa-clock text-2xl text-primary mb-2"></i>
        <p class="text-sm font-medium">班次管理</p>
      </a>
      <a href="modules/clock-record.html" class="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors text-center">
        <i class="fas fa-fingerprint text-2xl text-primary mb-2"></i>
        <p class="text-sm font-medium">打卡记录</p>
      </a>
      <a href="modules/leave-management.html" class="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors text-center">
        <i class="fas fa-calendar-minus text-2xl text-primary mb-2"></i>
        <p class="text-sm font-medium">请假管理</p>
      </a>
      <a href="modules/attendance-report.html" class="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors text-center">
        <i class="fas fa-chart-bar text-2xl text-primary mb-2"></i>
        <p class="text-sm font-medium">考勤报表</p>
      </a>
    </div>
  </div>

  <!-- 今日考勤概览 -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h3 class="text-lg font-semibold mb-4">今日考勤概览</h3>
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <span class="text-sm text-gray-600">正常打卡</span>
          </div>
          <span class="text-sm font-medium">823人</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
            <span class="text-sm text-gray-600">迟到</span>
          </div>
          <span class="text-sm font-medium">5人</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-orange-500 rounded-full"></div>
            <span class="text-sm text-gray-600">早退</span>
          </div>
          <span class="text-sm font-medium">2人</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            <span class="text-sm text-gray-600">缺卡</span>
          </div>
          <span class="text-sm font-medium">1人</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
            <span class="text-sm text-gray-600">请假</span>
          </div>
          <span class="text-sm font-medium">25人</span>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h3 class="text-lg font-semibold mb-4">待处理事项</h3>
      <div class="space-y-3">
        <div class="flex items-center justify-between p-3 bg-orange-50 rounded-lg">
          <div class="flex items-center gap-3">
            <i class="fas fa-calendar-minus text-orange-500"></i>
            <span class="text-sm">待审批请假申请</span>
          </div>
          <span class="text-sm font-medium text-orange-600">12条</span>
        </div>
        <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg">
          <div class="flex items-center gap-3">
            <i class="fas fa-edit text-blue-500"></i>
            <span class="text-sm">待审批补卡申请</span>
          </div>
          <span class="text-sm font-medium text-blue-600">3条</span>
        </div>
        <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg">
          <div class="flex items-center gap-3">
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <span class="text-sm">考勤异常待处理</span>
          </div>
          <span class="text-sm font-medium text-red-600">8条</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
